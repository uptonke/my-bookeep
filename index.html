<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>個人記帳系統</title>
  <link rel="stylesheet" href="./style.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script defer src="./config.js"></script>
  <script defer src="./script.js"></script>
</head>
<body>
  <div class="app-shell">
    <aside class="sidebar">
      <div class="brand">
        <div class="brand-mark">帳</div>
        <div>
          <h1>個人記帳</h1>
          <p>雲端資料庫</p>
        </div>
      </div>

      <nav class="nav">
        <button class="nav-btn active" data-tab="overview">總覽</button>
        <button class="nav-btn" data-tab="transactions">流水帳</button>
        <button class="nav-btn" data-tab="budget">年度預算</button>
        <button class="nav-btn" data-tab="accounts">帳戶</button>
        <button class="nav-btn" data-tab="categories">分類 / 標籤</button>
        <button class="nav-btn" data-tab="recurring">訂閱管理</button>
        <button class="nav-btn" data-tab="creditLoans">信用卡 / 貸款</button>
        <button class="nav-btn" data-tab="goals">目標</button>
        <button class="nav-btn" data-tab="reports">報表</button>
        <button class="nav-btn" data-tab="settings">設定</button>
      </nav>

      <div class="sidebar-footer">
        <div class="status-dot" id="connectionDot"></div>
        <span id="connectionStatus">尚未連線</span>
      </div>
    </aside>

    <main class="main">
      <header class="topbar">
        <div>
          <h2 id="pageTitle">總覽</h2>
          <p id="pageSubtitle">年度預算、流水帳、帳戶餘額與報表</p>
        </div>
        <div class="top-actions">
          <select id="yearSelect" class="input compact"></select>
          <button id="refreshBtn" class="btn secondary">重新整理</button>
          <button id="exportBtn" class="btn secondary">匯出表格</button>
        </div>
      </header>

      <section id="alertBox" class="alert hidden"></section>
      <section id="app" class="content"></section>
    </main>
  </div>

  <dialog id="confirmDialog" class="dialog">
    <form method="dialog">
      <h3 id="confirmTitle">確認操作</h3>
      <p id="confirmMessage"></p>
      <div class="dialog-actions">
        <button class="btn secondary" value="cancel">取消</button>
        <button class="btn danger" value="confirm">確認</button>
      </div>
    </form>
  </dialog>
</body>
</html>
